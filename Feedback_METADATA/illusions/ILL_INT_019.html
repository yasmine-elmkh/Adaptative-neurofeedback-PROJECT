<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">
<title>Neon Spreading — NeuroCap</title><style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a12;color:#e0e0ff;font-family:system-ui;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:16px}
h1{font-size:18px;font-weight:500;margin-bottom:4px;color:#a0b4ff}
.d{font-size:12px;color:#5060a0;margin-bottom:8px}
.b{display:inline-block;padding:3px 10px;border-radius:12px;background:#1a2060;border:1px solid #3040a0;font-size:11px;color:#80a0ff;margin-bottom:14px}
canvas{border:1px solid #1a2040;border-radius:8px;max-width:100%}
.ctrl{margin-top:16px;width:100%;max-width:540px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cg{background:#0d0e1a;border:1px solid #1a2040;border-radius:8px;padding:10px 12px}
.cg label{font-size:11px;color:#5060a0;display:flex;justify-content:space-between;margin-bottom:5px}
.cg label span{color:#a0b4ff;font-weight:500}
input[type=range]{width:100%;accent-color:#4060ff;height:4px}
.btns{margin-top:12px;display:flex;gap:10px}
button{padding:8px 20px;border-radius:20px;border:1px solid #3040a0;background:#0d1030;color:#80a0ff;cursor:pointer;font-size:12px}
</style></head><body>
<h1>Neon Spreading</h1><p class="d">La couleur semble déborder des contours</p><span class="b">⚡ V4 couleur</span>
<canvas id="c" width="540" height="540"></canvas>
<div class="ctrl"><div class="cg"><label>Rayon <span id="rdV">100</span></label><input type="range" id="rd" min="50" max="200" step="10" value="100" oninput="document.getElementById('rdV').textContent=this.value"></div><div class="cg"><label>Intensité <span id="itV">0.6</span></label><input type="range" id="it" min="0.1" max="1" step="0.05" value="0.6" oninput="document.getElementById('itV').textContent=this.value"></div><div class="cg"><label>Pulsation <span id="spdV">1</span></label><input type="range" id="spd" min="0.1" max="3" step="0.1" value="1" oninput="document.getElementById('spdV').textContent=this.value"></div><div class="cg"><label>Teinte <span id="hueV">60</span></label><input type="range" id="hue" min="0" max="360" step="10" value="60" oninput="document.getElementById('hueV').textContent=this.value"></div></div>
<div class="btns"><button id="bp">⏸ Pause</button><button id="br">↺ Reset</button></div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let running=true,frame=0;
document.getElementById('bp').addEventListener('click',function(){running=!running;this.textContent=running?'⏸ Pause':'▶ Play';if(running)go();});
document.getElementById('br').addEventListener('click',()=>frame=0);
function gv(id){return parseFloat(document.getElementById(id).value);}
const W=canvas.width,H=canvas.height,CX=W/2,CY=H/2;
function draw(){ctx.fillStyle='#0a0a12';ctx.fillRect(0,0,W,H);
const r=parseInt(gv('rd')),it=gv('it'),sp=gv('spd'),hue=gv('hue'),p=0.5+0.5*Math.sin(frame*sp*0.03);
ctx.strokeStyle='rgba(40,40,80,0.8)';ctx.lineWidth=1.5;
for(let x=0;x<W;x+=30){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
for(let y=0;y<H;y+=30){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
const g=ctx.createRadialGradient(CX,CY,0,CX,CY,r*1.5);
g.addColorStop(0,`hsla(${hue},100%,70%,${it*p})`);g.addColorStop(0.5,`hsla(${hue},80%,50%,${it*p*0.4})`);g.addColorStop(1,'rgba(0,0,0,0)');
ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
for(let i=0;i<12;i++){const a=i*2*Math.PI/12;ctx.beginPath();ctx.arc(CX,CY,r,a,a+Math.PI/9.6);ctx.strokeStyle=`hsl(${(hue+i*30)%360},100%,70%)`;ctx.lineWidth=4;ctx.stroke();}}
function go(){if(!running)return;frame++;draw();requestAnimationFrame(go);}go();
</script></body></html>
